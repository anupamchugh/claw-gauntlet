name: Feature proposal
description: Propose one bounded capability or improvement.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Describe a small, testable boundary. Catalog registration is not implementation, and external actions must remain human-approved.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What public, reproducible problem should this solve?
    validations:
      required: true
  - type: textarea
    id: boundary
    attributes:
      label: Proposed capability boundary
      description: Define inputs, outputs, permissions, evidence, failure behavior, and non-goals.
      placeholder: |
        Inputs:
        Outputs:
        Permissions:
        Evidence:
        Failure behavior:
        Non-goals:
    validations:
      required: true
  - type: textarea
    id: provenance
    attributes:
      label: Public source and provenance
      description: Link a canonical public specification or minimal license-compatible fixture.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance tests
      description: List deterministic success, validation, failure, privacy, and permission checks.
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety constraints
      options:
        - label: The proposal uses least privilege and keeps credentials out of source content and evidence.
          required: true
        - label: Any external write or communication requires explicit human approval.
          required: true
        - label: The feature will not autonomously post, message, vote, solicit engagement, or contact people.
          required: true
        - label: The issue contains no secret, private repository data, mailbox content, personal export, or customer identifier.
          required: true
